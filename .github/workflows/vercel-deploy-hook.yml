name: Trigger Vercel deploy hook

# Repo secret: VERCEL_DEPLOY_HOOK_URL (create hook under Vercel → Project → Settings → Git).

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: POST deploy hook
        env:
          VERCEL_DEPLOY_HOOK_URL: ${{ secrets.VERCEL_DEPLOY_HOOK_URL }}
        run: |
          if [ -z "$VERCEL_DEPLOY_HOOK_URL" ]; then
            echo "Missing secret VERCEL_DEPLOY_HOOK_URL — add it under Repo → Settings → Secrets and variables → Actions"
            exit 1
          fi
          curl -fsS -X POST "$VERCEL_DEPLOY_HOOK_URL"
